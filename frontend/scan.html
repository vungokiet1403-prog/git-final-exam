<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>Truy xuất sản phẩm</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
  />
</head>

<body class="bg-light">
  <div class="container mt-5">
    <div class="card shadow">
      <div class="card-header fw-bold">
        🔍 Thông tin truy xuất
      </div>
      <div class="card-body" id="info"></div>
    </div>
  </div>

<script>
  const params = new URLSearchParams(window.location.search);
  const id = params.get("id");

  const products = JSON.parse(localStorage.getItem("products")) || [];
  const product = products.find(p => p.id == id);

  const info = document.getElementById("info");

  if (!product) {
    info.innerHTML = "<p class='text-danger'>❌ Không tìm thấy sản phẩm</p>";
  } else {
    info.innerHTML = `
      <p><strong>Tên sản phẩm:</strong> ${product.name}</p>
      <p><strong>Nguồn gốc:</strong> ${product.origin}</p>
      <p><strong>Mã truy xuất:</strong> ${product.id}</p>
    `;
  }
</script>
</body>
</html>
