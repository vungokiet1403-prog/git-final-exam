<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <title>Danh sách sản phẩm</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body { background: #f5f7fa; }
    .hash {
      font-family: monospace;
      font-size: 13px;
      word-break: break-all;
      max-width: 280px;
    }
    .qr img { width: 80px; }
  </style>
</head>
<body>

<div class="container mt-5">
  <h2 class="text-center fw-bold mb-4">📦 Danh sách sản phẩm truy xuất nguồn gốc</h2>

  <div class="text-end mb-3">
    <button class="btn btn-success" onclick="loadProducts()">🔄 Tải danh sách</button>
  </div>

  <div class="table-responsive">
    <table class="table table-bordered table-hover align-middle">
      <thead class="table-primary text-center">
        <tr>
          <th>#</th>
          <th>Mã SP</th>
          <th>Tên sản phẩm</th>
          <th>Mã lô</th>
          <th>Nhà sản xuất</th>
          <th>Ngày tạo</th>
          <th>Hash Blockchain</th>
          <th>Lịch sử</th>
          <th>QR</th>
        </tr>
      </thead>
      <tbody id="productTable"></tbody>
    </table>
  </div>

  <div class="text-center mt-4">
    <a href="index.html">⬅ Quay về trang chủ</a>
  </div>
</div>

<script>
async function loadProducts() {
  const res = await fetch("http://localhost:3000/api/products");
  const products = await res.json();

  const table = document.getElementById("productTable");
  table.innerHTML = "";

  products.forEach((p, i) => {
    const verifyUrl = `verify.html?batch=${p.batchCode}`;
    const qrUrl = `https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=${verifyUrl}`;

    table.innerHTML += `
      <tr>
        <td class="text-center">${i + 1}</td>
        <td>${p.productCode}</td>
        <td>${p.productName}</td>
        <td><strong>${p.batchCode}</strong></td>
        <td>${p.manufacturer || "HTX Nông nghiệp"}</td>
        <td>${new Date(p.createdAt).toLocaleDateString()}</td>
        <td class="hash">${p.blockchainHash || ""}</td>
        <td class="text-center">
          <a href="${verifyUrl}" class="btn btn-sm btn-primary">Xem</a>
        </td>
        <td class="qr text-center">
          <img src="${qrUrl}">
        </td>
      </tr>
    `;
  });
}

loadProducts();
</script>

</body>
</html>
